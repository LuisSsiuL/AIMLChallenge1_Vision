; AI-Thinker ESP32-CAM board
; Classic ESP32 (not S3), OV2640 camera, 4MB flash + 4MB PSRAM
; Flashed via external USB-TTL adapter (CH340), IO0->GND to enter boot mode

[env:esp32cam]
platform = espressif32@6.7.0
board = esp32cam
framework = arduino

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=0

monitor_speed = 115200
upload_speed = 460800
upload_port = /dev/cu.usbserial-110
monitor_port = /dev/cu.usbserial-110

lib_deps =
    esp32-camera
    links2004/WebSockets@^2.4.1
    ayushsharma82/ElegantOTA@^3.1.5
